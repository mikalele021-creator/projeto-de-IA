<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"

    <link rel="stylesheet" href="prof.css">

</head>

<body>
    <header>
        <div class="cm">

                <button><i class="fa-solid fa-arrow-left"></i></button>

            </div>
            <div class="btns">
                <button>✨Organizar com IA</button>
                <button>💾Salvar Mapa</button>
            </div>
        </div>
        <div class="azul">
            <button class="ativo">Dados dos Alunos</button> <button>Mapa de Sala</button>
        </div>

    </header>
    <main>
<div> 
    <div class="adicionar">
<h3>Adicionar Alunos</h3>
<h4>Nome</h4>
<input type="text"  id="nome" placeholder="Nome completo:">
<h4>Altura (cm):</h4>
<input type="number" id="altura" placeholder="Altura:" >
<label>
<input type="checkbox" id="visao">
<p>Problema de Visão</p>
</label>
<label>
    <input type="checkbox" id="audicao">
    <p>Problema de Audição</p>
</label>
<h4>Obeservações de Comportamento</h4>
<textarea id="obs" placeholder="Obsevações:"></textarea>
<button class="botao" onclick="salvarAlunos()">Adicionar</button>
    </div>
    <hr>
    <div class="lista"> 

    </div>
</div>


    </main>

</html>
